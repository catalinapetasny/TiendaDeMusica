<div class="container">
    <div class="row">
        @for (p of Productos; track p.id) {
        @if(p.disponibilidad) {

        <div class="card col-3 p-0 m-4">
            <img src="{{ p.imagen }}" class="card-img-top" alt="">
            <div class="card-body">
                <h5 class="card-title">{{ p.nombre }}</h5>
                <p class="card-text">{{ p.descripcion }}</p>
                <p class="card-text">{{ p.precio }}</p>
                <a routerLink="../carrito" class="btn btn-primary">Agregar al carrito</a>
            </div>
        </div>
        }
        }
    </div>
</div>

<div class="container">
    <h1 class="titulo">
        Crear cuenta
    </h1>

    <form>

        <div class="mb-2">
            <label for="email" class="form-label" style="color: white;">Email</label>
            <input type="email" id="email" class="form-control" required placeholder="Email">
        </div>

        <div class="mb-2">
            <label for="contrasena" class="form-label" style="color: white;">Crea una contraseña</label>
            <input type="password" id="contrasena" class="form-control" required placeholder="Contraseña">
        </div>
        
        <div class="mb-2">
            <label for="repetir-contrasena" class="form-label" style="color: white;">Repita la contraseña</label>
            <input type="password" id="repetir-contrasena" class="form-control" required placeholder="Contraseña">
        </div> <br>

        <button class="btn btn-light w-100">Registrarse</button>

    </form> <br>

    <p>
        <a href="/inicio-sesion" style="color: white;">
            <u>
                ¿Ya tenés cuenta? Inicia sesión
            </u>
        </a>
    </p>

</div>
